[mgr]
cwd = { fg = "#5f6c1f" }

find_keyword = { bold = true, fg = "#fabd2f" }
find_position = { fg = "#96bda2" }

marker_copied = { fg = "#b8bb26", bg = "#b8bb26" }
marker_cut = { fg = "#fb4934", bg = "#fb4934" }
marker_selected = { fg = "#fabd2f", bg = "#fabd2f" }

count_copied = { fg = "#282828", bg = "#b8bb26" }
count_cut = { fg = "#282828", bg = "#fb4934" }
count_selected = { fg = "#282828", bg = "#fabd2f" }

border_style = { fg = "#b8bb26" }

[tabs]
active = { fg = "#282828", bg = "#b8bb26"}
inactive = { fg = "#b8bb26", bg = "#3c3836" }

[indicator]
parent = { reversed = true }
current = { reversed = true }
preview = { underline = true }

[mode]
normal_main = { fg = "#282828", bg = "#b8bb26", bold = true }
normal_alt = { fg = "#b8bb26", bg = "#504945" }

select_alt = { fg = "#96bda2", bg = "#504945" }
select_main = { fg = "#282828", bg = "#96bda2", bold = true }

unset_main = { fg = "#282828", bg = "#fb4934", bold = true }
unset_alt = { fg = "#fb4934", bg = "#504945" }

[status]
perm_exec = { fg = "#b8bb26" }
perm_read = { fg = "#fabd2f" }
perm_sep = { fg = "#5f6c1f" }
perm_type = { fg = "#b8bb26" }
perm_write = { fg = "#fb4934" }

progress_error = { fg = "#fb4934", bg = "#282828" }
progress_label = { fg = "#d5c4a1", bg = "#282828" }
progress_normal = { fg = "#d5c4a1", bg = "#282828" }

[pick]
active = { fg = "#96bda2" }
border = { fg = "#b8bb26" }
inactive = { fg = "#d5c4a1" }

[task]
title = { fg = "#b8bb26" }
border = { fg = "#b8bb26" }
hovered = { fg = "#d5c4a1", bg = "#504945" }

[input]
border = { fg = "#b8bb26" }
selected = { bg = "#504945" }

[help]
desc = { fg = "#d5c4a1" }
on = { fg = "#5f6c1f" }
run = { fg = "#96bda2" }
hovered = { reversed = true, bold = true }
footer = { fg = "#504945", bg = "#d5c4a1" }

[which]
mask = { bg = "#504945" }
desc = { fg = "#d5c4a1" }
cand = { fg = "#5f6c1f" }
rest = { fg = "#d65d0e" }

separator_style = { fg = "#bdae93" }

[notify]
title_info = { fg = "#5f6c1f" }
title_warn = { fg = "#fabd2f" }
title_error = { fg = "#fb4934" }
 
[filetype]
rules = [
  { mime = "image/*", fg = "#5f6c1f" },
  { mime = "{audio, video}/*", fg = "#fabd2f" },
   
  { mime = "application/{pdf,doc,rtf}", fg = "#b8bb26" },
  
  { mime = "application/" },
  
  { url = "*/", fg = "#b8bb26" },
  { mime = "*", fg = "#d5c4a1" },
]

